<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mario Pyramid</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 30px;
        }
        #pyramid {
            white-space: pre;
            font-family: monospace;
            font-size: 20px;
            margin-top: 20px;
        }
        button {
            padding: 10px 20px;
            background: maroon;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background: #8b0000;
        }
    </style>
</head>
<body>

    <h2>Mario Pyramid (CS50 Version)</h2>

    <label>Masukkan tinggi (n): </label>
    <input type="number" id="height" min="1" placeholder="contoh: 5">

    <button onclick="generatePyramid()">Buat Piramid</button>

    <div id="pyramid"></div>

    <script>
        function generatePyramid() {
            let n = document.getElementById("height").value;
            n = parseInt(n);

            if (isNaN(n) || n < 1) {
                alert("Masukkan angka minimal 1");
                return;
            }

            let output = "";

            for (let i = 0; i < n; i++) {
                let spaces = " ".repeat(n - i - 1);
                let bricks = "#".repeat(i + 1);
                output += spaces + bricks + "\n";
            }

            document.getElementById("pyramid").textContent = output;
        }
    </script>

</body>
</html>
